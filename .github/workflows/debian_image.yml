name: Build Debian VM Image

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/build-debian-image.sh'
      - '.github/workflows/debian_image.yml'
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture (aarch64 | x86_64 | all)"
        required: false
        default: "all"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # UML (User Mode Linux) CANNOT be cross-compiled — ARCH=um always
          # targets the host CPU's userspace ABI. Build each arch natively.
          - arch: aarch64
            runner: ubuntu-24.04-arm   # GitHub-hosted ARM64 runner
          - arch: x86_64
            runner: ubuntu-24.04       # Standard x86_64 runner
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap qemu-user-static binfmt-support \
            libguestfs-tools qemu-utils \
            build-essential flex bison libssl-dev libelf-dev bc

      - name: Build Debian rootfs + UML kernel (${{ matrix.arch }})
        run: |
          chmod +x scripts/build-debian-image.sh
          sudo ./scripts/build-debian-image.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-image-${{ matrix.arch }}
          path: output/
          retention-days: 3

  publish:
    permissions:
      contents: write
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./output

      - name: List output files
        run: ls -lh output/

      - name: Delete old debian-latest release + tag (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin :refs/tags/debian-latest 2>/dev/null || true

      - name: Create rolling debian-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILT_AT="$(date '+%Y-%m-%d %H:%M UTC')"
          gh release create debian-latest \
            --title "Debian VM image (latest) — ${BUILT_AT}" \
            --notes "Rolling release — Debian bookworm rootfs + UML kernel for DevBox.

          DevBox uses Linux UML — runs as a normal Termux process, no KVM, Android 11+.

          **Built:** ${BUILT_AT}
          **Commit:** ${{ github.sha }}

          Files downloaded by \`devbox-second-stage.sh\` on first launch:
          - \`debian-rootfs-aarch64.img.gz\` / \`debian-rootfs-x86_64.img.gz\`
          - \`linux-uml-aarch64\` / \`linux-uml-x86_64\`

          > Do not delete this release — DevBox downloads from this tag." \
            --prerelease

          for f in output/*; do
            gh release upload debian-latest "$f" --clobber
          done
